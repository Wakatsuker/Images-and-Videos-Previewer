<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Images and Video Previewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
    <div id="header-controls">
        <div class="toolbar">
            <input type="file" id="file-input" multiple style="display:none">
            <div style="display: flex; gap: 8px;">
                <button class="btn-open" onclick="document.getElementById('file-input').click()">📂 Open File</button>
                <button id="btn-mute" class="btn-mute" title="Toggle Mute">🔇</button>
            </div>
        </div>
        <input type="text" id="search-bar" placeholder="Search files...">
        <div class="filter-group">
            <label><input type="radio" name="filter" value="all" checked> All</label>
            <label><input type="radio" name="filter" value="images"> 🖼️ Images</label>
            <label><input type="radio" name="filter" value="videos"> 🎬 Videos</label>
        </div>
    </div>
    <div id="tree-container">
        <div id="tree"></div>
    </div>
</div>

<div id="resizer"></div>

<div id="preview" class="empty-msg">
    <p id="previewText">Preview Here</p>
    <p id="watermark"></p>

    <div class="nav-controls">
        <button id="prev-btn" class="nav-btn" title="Previous Item">⬅️</button>
        <button id="next-btn" class="nav-btn" title="Next Item">➡️</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.7.53/dist/zip.min.js"></script>
<script src="script.js"></script>
</body>
</html>
